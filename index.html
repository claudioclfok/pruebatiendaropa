<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tienda Online</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; }
    .producto { border: 1px solid #ccc; padding: 10px; margin-bottom: 10px; }
    .productos { max-width: 400px; margin: auto; }
    button { padding: 5px 10px; cursor: pointer; }
  </style>
</head>
<body>

  <h1>Mi Tienda Online</h1>

  <section class="productos">

    <div class="producto">
      <h2>Campera Oversize</h2>
      <p>Precio: $85.000</p>
      <button onclick="agregarCarrito(1,'Campera Oversize',85000)">Agregar al carrito</button>
    </div>

    <div class="producto">
      <h2>Vestido Minimal</h2>
      <p>Precio: $72.000</p>
      <button onclick="agregarCarrito(2,'Vestido Minimal',72000)">Agregar al carrito</button>
    </div>

  </section>

  <script src="script.js"></script>
</body>
</html>
